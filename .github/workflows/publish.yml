name: Publish to npm

on:
  release:
    types: [published]
  # Lets a maintainer publish a beta without cutting a GitHub release —
  # run "Publish to npm" from the Actions tab on the branch you want.
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC — npm trusted publishing + provenance

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      # npm >= 11.5.1 for trusted publishing; pin 11.x (npm 12.0.0 drops bundled sigstore — npm/cli#9722).
      - name: Update npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      # Derive the dist-tag from the version. A pre-release (e.g. 1.1.0-beta.1)
      # publishes under its pre-id tag ("beta"); a stable version under "latest".
      # This is what stops a -beta build from ever landing on the `latest` tag —
      # a plain `npm publish` would, because 1.1.0-beta.1 > the current 1.0.x.
      - name: Determine npm dist-tag
        id: tag
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" == *-* ]]; then
            PREID="${VERSION#*-}"   # 1.1.0-beta.1 -> beta.1
            TAG="${PREID%%.*}"      # beta.1       -> beta
          else
            TAG="latest"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing $VERSION under dist-tag '$TAG'"

      # prepublishOnly runs lint + typecheck + build + test.
      # Auth comes from the npm Trusted Publisher (OIDC) — no token secret.
      - name: Publish
        run: npm publish --tag "${{ steps.tag.outputs.tag }}"
