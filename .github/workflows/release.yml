name: Release

on:
  # Manual only — run "Release" from the Actions tab when you want to cut a release.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read version and check for an existing release
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v$VERSION already exists — nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Creates the release, which triggers publish.yml (npm publish over OIDC).
      # A pre-release version (e.g. 1.1.0-beta.3) is marked --prerelease.
      - name: Create release with the latest CHANGELOG section as notes
        if: steps.meta.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          # Top CHANGELOG section: first "## [" heading to the next, minus the heading line.
          awk '/^## \[/{n++} n==1' CHANGELOG.md | sed '1d' > RELEASE_NOTES.md
          PRERELEASE=""
          case "$VERSION" in *-*) PRERELEASE="--prerelease" ;; esac
          if [ -s RELEASE_NOTES.md ]; then
            gh release create "v$VERSION" --target "$GITHUB_SHA" --title "v$VERSION" $PRERELEASE --notes-file RELEASE_NOTES.md
          else
            gh release create "v$VERSION" --target "$GITHUB_SHA" --title "v$VERSION" $PRERELEASE --generate-notes
          fi
